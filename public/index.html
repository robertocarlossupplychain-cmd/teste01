<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMSLite - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <header class="auth-header">
                <div style="font-size: 3rem; color: var(--brand); margin-bottom: 16px;">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <h1>BuildFlow ERP</h1>
                <p>Gestão inteligente para sua obra</p>
            </header>

            <form id="loginForm">
                <div class="form-group">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="text" id="username" class="form-input" placeholder="E-mail ou usuário" required>
                </div>

                <div class="form-group">
                    <i class="fa-regular fa-lock"></i>
                    <input type="password" id="password" class="form-input" placeholder="Sua senha" required>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 0.8125rem;">
                    <label style="display: flex; align-items: center; gap: 8px; color: var(--text-muted); cursor: pointer;">
                        <input type="checkbox" checked style="accent-color: var(--brand);"> Lembrar-me
                    </label>
                    <a href="#" style="color: var(--brand); text-decoration: none; font-weight: 600;">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn btn-brand" style="padding: 16px;">
                    ENTRAR NO SISTEMA
                </button>
            </form>

            <footer style="margin-top: 32px; text-align: center; font-size: 0.75rem; color: var(--text-muted);">
                <p>&copy; 2026 BuildFlow S.A. Todos os direitos reservados.</p>
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            try {
                const btn = e.target.querySelector('button');
                btn.disabled = true;
                btn.innerText = 'AUTENTICANDO...';

                await BuildFlow.login(email, pass);
                window.location.href = 'dashboard.html';
            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Erro de Autenticação',
                    text: error.message || 'Erro ao realizar login',
                    confirmButtonColor: '#4f46e5'
                });
                const btn = e.target.querySelector('button');
                btn.disabled = false;
                btn.innerText = 'ENTRAR NO SISTEMA';
            }
        });
    </script>
</body>
</html>
