<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildFlow - Mensagens</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        .center-panel {
            min-height: 75vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 16px;
            padding: 40px 20px;
        }
        .center-panel h1 {
            margin: 0;
        }
        .center-panel button {
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            padding: 10px 18px;
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }
        .center-panel button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="layout">
        <main class="main-content" style="padding: 32px;">
            <div class="center-panel">
                <i class="fa-solid fa-envelope fa-3x"></i>
                <h1>Mensagens</h1>
                <p>O recurso de mensagens ainda está em desenvolvimento. Em breve você poderá acompanhar conversas e avisos internos.</p>
                <button onclick="window.location.href='../dashboard.html'">Voltar ao Dashboard</button>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            BuildFlow.checkAuth();
            BuildFlow.applyTheme();
            BuildFlow.initGlobalSearch();
            BuildFlow.initGlobalNotifications();
        });
    </script>
</body>
</html>
