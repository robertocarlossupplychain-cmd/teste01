<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildFlow - Avisos</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        .page-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .alerts-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .alerts-group {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
        }
        .alerts-group h3 {
            margin-top: 0;
            margin-bottom: 16px;
        }
        .notification-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .notification-panel.empty {
            color: var(--text-muted);
            text-align: center;
            padding: 32px;
        }
        .notification-panel button {
            align-self: flex-end;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }
        .notification-panel button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .alert-item {
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .alert-item h4 {
            margin: 0;
            font-size: 1rem;
        }
        .alert-item p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .alert-item small {
            color: var(--text-secondary);
            display: block;
            margin-top: 6px;
        }
        .alert-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }
        .alert-action-btn {
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        .alert-action-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .alert-details {
            font-size: 0.88rem;
            color: var(--text-muted);
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="layout">
        <main class="main-content" style="padding: 32px;">
            <div class="page-actions">
                <div>
                    <h1>Avisos</h1>
                    <p>Visualize os alertas não lidos e acompanhe as notificações já marcadas como lidas.</p>
                </div>
                <button class="btn" onclick="window.location.href='../dashboard.html'">
                    <i class="fa-solid fa-arrow-left"></i> Voltar
                </button>
            </div>

            <div class="notification-panel">
                <div class="notification-header">
                    <div>
                        <strong>Resumo de Avisos</strong>
                        <p style="margin: 4px 0 0; color: var(--text-muted);">Use a lista abaixo para acompanhar o histórico de notificações.</p>
                    </div>
                    <button id="markAllReadBtn">Marcar todas como lidas</button>
                </div>
                <div id="alertsSummary">Carregando notificações...</div>
            </div>

            <div class="alerts-section" id="alertsSection">
                <div class="alerts-group">
                    <h3>Avisos Pendentes</h3>
                    <div id="unreadList"></div>
                </div>
                <div class="alerts-group">
                    <h3>Avisos Descartados</h3>
                    <div id="readList"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/main.js"></script>
    <script>
        function createAlertHtml(item, notificationKey, isUnread) {
            const details = (item.items || [])
                .map((product) => {
                    const expiryText = product.expiryDate
                        ? ` • Validade: ${new Date(product.expiryDate).toLocaleDateString('pt-BR')}`
                        : '';
                    const perishableText = product.perishable ? 'Perecível' : 'Não perecível';
                    return `<div>${product.name || 'Produto'} (${product.sku || '---'}) • ${product.quantity || 0} un${expiryText} • ${perishableText}</div>`;
                })
                .join('');

            return `
                <div class="alert-item" data-notification-key="${notificationKey}">
                    <div class="alert-info">
                        <h4>${item.title}</h4>
                        <p>${item.description}</p>
                    </div>
                    ${details ? `<div class="alert-details">${details}</div>` : ''}
                    <div class="alert-actions">
                        ${item.href ? `<button class="alert-action-btn" onclick="window.location.href='${item.href}'">Abrir</button>` : ''}
                        ${isUnread ? `<button class="alert-action-btn mark-read-btn" data-notification-key="${notificationKey}">Marcar como lida</button>` : ''}
                    </div>
                </div>
            `;
        }

        async function renderNotifications() {
            const unreadContainer = document.getElementById('unreadList');
            const readContainer = document.getElementById('readList');
            const summary = document.getElementById('alertsSummary');
            const notifications = await BuildFlow.getDashboardNotifications();

            summary.innerHTML = `${notifications.length} aviso(s) não lido(s)`;

            unreadContainer.innerHTML = notifications.length
                ? notifications.map((item) => createAlertHtml(item, BuildFlow.escapeHtml(BuildFlow.getNotificationKey(item)), true)).join('')
                : '<div class="notification-panel empty">Sem avisos não lidos.</div>';

            readContainer.innerHTML = '<div class="notification-panel empty">Os avisos marcados como lidos são automaticamente removidos do histórico.</div>';

            document.querySelectorAll('.mark-read-btn').forEach((button) => {
                button.addEventListener('click', async (event) => {
                    event.stopPropagation();
                    const notificationKey = button.dataset.notificationKey;
                    if (notificationKey) {
                        await BuildFlow.dismissNotificationByKey(notificationKey);
                        await renderNotifications();
                    }
                });
            });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            BuildFlow.checkAuth();
            BuildFlow.applyTheme();
            BuildFlow.initGlobalSearch();
            BuildFlow.initGlobalNotifications();

            const markAllReadBtn = document.getElementById('markAllReadBtn');
            if (markAllReadBtn) {
                markAllReadBtn.addEventListener('click', async () => {
                    const notifications = await BuildFlow.getDashboardNotifications();
                    await BuildFlow.dismissNotifications(notifications);
                    await renderNotifications();
                });
            }

            await renderNotifications();
        });
    </script>
</body>
</html>
